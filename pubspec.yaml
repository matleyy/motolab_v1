name: MotoLab APK Production Engine (Signed Release)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the codebase down to the GitHub virtual runner
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # 2. Re-create the secure physical keystore file inside the runner from GitHub Secrets
      - name: Decode Secure Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/motolab-release-key.jks

      # 3. Inject operational signing environment variables directly into Gradle configurations
      - name: Inject Code-Signing Profile
        run: |
          echo "storeFile=motolab-release-key.jks" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      # 4. Initialize Java Developer Kits needed for building Android packages
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. Bring up the stable Flutter compiler environment
      - name: Set up Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # 6. Synchronize active ecosystem dependencies
      - name: Install System Dependencies
        run: flutter pub get

      # 7. Execute compilation engine to generate high-performance optimized binaries
      - name: Compile Cloud-Signed Production APKs
        run: flutter build apk --release --split-per-abi

      # 8. Extract the finished application packages out to your downloadable browser panel
      - name: Upload Signed Installation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: motolab-v1-signed-apks
          path: build/app/outputs/flutter-apk/*-release.apk
